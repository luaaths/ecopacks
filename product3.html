<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eco Impact Calculator</title>
  <link rel="stylesheet" href="style2.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="calculator-container">
    <h1>Eco Impact Calculator</h1>
    <label for="packages">Packages used per month:</label>
    <input type="number" id="packages" placeholder="e.g. 500">
    <button onclick="calculateImpact()">Calculate</button>

    <div id="results"></div>
    <canvas id="impactChart" width="400" height="200"></canvas>
  </div>
  <footer>
    <p>&copy; 2025 Eco Packaging Co. | All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
